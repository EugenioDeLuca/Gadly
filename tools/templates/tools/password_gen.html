{% extends "tools/base.html" %}
{% load static %}
{% block title %}Password Generator{% endblock %}
{% block body_class %}password-gen{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'tools/css/password.css' %}">
{% endblock %}

{% block content %}
<div class="container">

    <h1>Password Generator</h1>

    <label for="length">Password Length</label>
    <input type="number" id="length" value="16" min="14" max="128">

    <div class="options">
        <label class="pwd-option"><input type="checkbox" id="include-lower" checked><span class="check-box"></span><span class="pwd-option-label">Lowercase</span></label>
        <label class="pwd-option"><input type="checkbox" id="include-upper" checked><span class="check-box"></span><span class="pwd-option-label">Uppercase</span></label>
        <label class="pwd-option"><input type="checkbox" id="include-numbers" checked><span class="check-box"></span><span class="pwd-option-label">Numbers</span></label>
        <label class="pwd-option"><input type="checkbox" id="include-symbols" checked><span class="check-box"></span><span class="pwd-option-label">Symbols</span></label>
    </div>
    <div class="pwd-error" id="pwd-error" role="alert"></div>

    <input type="text" id="password" readonly placeholder="Your password will appear here">

    <div class="button-wrapper">
        <button id="generate-btn">Generate</button>
        <button id="copy-btn">Copy</button>
    </div>

    <div style="margin-top:20px; text-align:center;">
        <a href="{% url 'home' %}" class="home-link" title="Back to Home" aria-label="Back to Home">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="#007BFF"><path d="M12 3L4 10.5L4 18.5Q4 21 6.5 21L9.5 21L9.5 15L14.5 15L14.5 21L17.5 21Q20 21 20 18.5L20 10.5L12 3z"/></svg>
        </a>
    </div>

</div>

<script src="{% static 'tools/js/password.js' %}"></script>
{% endblock %}
