{% extends "tools/base.html" %}
{% load static %}
{% block title %}Remove Spaces{% endblock %}
{% block body_class %}text-tool remove-spaces{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'tools/css/text-tools.css' %}">
{% endblock %}
{% block content %}
<div class="container">
    <h1>Remove Spaces</h1>
    <p class="tool-desc">Remove or normalize spaces in your text.</p>
    <div class="text-tool-row">
        <textarea id="text-input" placeholder="Paste your text here..." rows="8"></textarea>
    </div>
    <div class="text-tool-options">
        <label><input type="radio" name="mode" value="all" checked> Remove all spaces</label>
        <label><input type="radio" name="mode" value="extra"> Collapse multiple spaces</label>
    </div>
    <div class="button-group">
        <button type="button" id="btn-transform">Transform</button>
        <button type="button" id="btn-copy">Copy result</button>
    </div>
    <div id="result-area" class="result-area hidden"></div>
    <div class="home-link-wrap">
        <a href="{% url 'home' %}" class="home-link" title="Back to Home" aria-label="Back to Home">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="#007BFF"><path d="M12 3L4 10.5L4 18.5L4 21Q4 21 6.5 21L9.5 21L9.5 15L14.5 15L14.5 21L17.5 21Q20 21 20 18.5L20 10.5L12 3z"/></svg>
        </a>
    </div>
</div>
<script src="{% static 'tools/js/remove_spaces.js' %}"></script>
{% endblock %}
