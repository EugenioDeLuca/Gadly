# Render Blueprint - Deploy Gadly
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: gadly
    runtime: python
    domains:
      - gadly.it
      - www.gadly.it

    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: python manage.py migrate --no-input && (python manage.py create_superuser_if_missing || true) && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        sync: false
        # Imposta nel Dashboard Render quando aggiungi gadly.it: gadly.it,www.gadly.it
        # Per il primo deploy l'URL .onrender.com viene aggiunto automaticamente
      # Credenziali admin (createsuperuser automatico all'avvio - senza Shell)
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      # Email (SMTP) - set in Dashboard to send verification emails
      # Use SendGrid, Mailgun, or your provider (e.g. Aruba)
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
